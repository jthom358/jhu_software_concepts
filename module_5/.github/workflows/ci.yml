
name: Module 5 Security CI



on:

  push:

    branches: [main]

    paths:

      - "module_5/**"

      - ".github/workflows/module5-ci.yml"

  pull_request:

    branches: [main]

    paths:

      - "module_5/**"

      - ".github/workflows/module5-ci.yml"



jobs:

  pylint:

    name: Pylint 10 of 10

    runs-on: ubuntu-latest



    steps:

      - name: Check out repository

        uses: actions/checkout@v4



      - name: Set up Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"

          cache: pip

          cache-dependency-path: module_5/requirements.txt



      - name: Install dependencies

        working-directory: module_5

        run: |

          python -m pip install --upgrade pip

          python -m pip install -r requirements.txt

          python -m pip install -e .



      - name: Run Pylint

        working-directory: module_5

        run: |

          python -m pylint src --fail-under=10



  dependency-graph:

    name: Generate Dependency Graph

    runs-on: ubuntu-latest



    steps:

      - name: Check out repository

        uses: actions/checkout@v4



      - name: Install Graphviz

        run: |

          sudo apt-get update

          sudo apt-get install -y graphviz



      - name: Set up Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"

          cache: pip

          cache-dependency-path: module_5/requirements.txt



      - name: Install dependencies

        working-directory: module_5

        run: |

          python -m pip install --upgrade pip

          python -m pip install -r requirements.txt

          python -m pip install -e .



      - name: Generate dependency.svg

        working-directory: module_5

        run: |

          python -m pydeps ./src \

            --noshow \

            -T svg \

            -o dependency.svg \

            --exclude flask flask.* \

            --max-bacon 2 \

            --rankdir LR



      - name: Verify dependency.svg exists

        working-directory: module_5

        run: |

          test -s dependency.svg



      - name: Upload dependency graph

        uses: actions/upload-artifact@v4

        with:

          name: module-5-dependency-graph

          path: module_5/dependency.svg



  snyk:

    name: Snyk Dependency Scan

    runs-on: ubuntu-latest



    steps:

      - name: Check out repository

        uses: actions/checkout@v4



      - name: Set up Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"

          cache: pip

          cache-dependency-path: module_5/requirements.txt



      - name: Install dependencies

        working-directory: module_5

        run: |

          python -m pip install --upgrade pip

          python -m pip install -r requirements.txt

          python -m pip install -e .



      - name: Install Snyk CLI

        uses: snyk/actions/setup@master



      - name: Run Snyk dependency scan

        working-directory: module_5

        env:

          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

        run: |

          snyk test --file=requirements.txt --package-manager=pip



  pytest:

    name: Pytest 100 Percent Coverage

    runs-on: ubuntu-latest



    services:

      postgres:

        image: postgres:18

        env:

          POSTGRES_USER: postgres

          POSTGRES_PASSWORD: postgres

          POSTGRES_DB: gradcafe_test

        ports:

          - 5432:5432

        options: >-

          --health-cmd="pg_isready -U postgres -d gradcafe_test"

          --health-interval=10s

          --health-timeout=5s

          --health-retries=5



    env:

      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gradcafe_test

      DB_HOST: localhost

      DB_PORT: "5432"

      DB_NAME: gradcafe_test

      DB_USER: postgres

      DB_PASSWORD: postgres



    steps:

      - name: Check out repository

        uses: actions/checkout@v4



      - name: Set up Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"

          cache: pip

          cache-dependency-path: module_5/requirements.txt



      - name: Install dependencies

        working-directory: module_5

        run: |

          python -m pip install --upgrade pip

          python -m pip install -r requirements.txt

          python -m pip install -e .



      - name: Run pytest with coverage

        working-directory: module_5

        run: |

          python -m pytest

