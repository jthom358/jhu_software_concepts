services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gradcafe
      POSTGRES_USER: gradcafe_app
      POSTGRES_PASSWORD: gradcafe_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U gradcafe_app -d gradcafe",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - module6_network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit loopback_users []"
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - module6_network

  web:
    build:
      context: .
      dockerfile: src/web/Dockerfile
    environment:
      DATABASE_URL: postgresql://gradcafe_app:gradcafe_password@db:5432/gradcafe
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - module6_network

  worker:
    build:
      context: .
      dockerfile: src/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://gradcafe_app:gradcafe_password@db:5432/gradcafe
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
      APPLICANT_DATA_PATH: /data/applicant_data.json
    volumes:
      - ./src/data:/data:ro
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - module6_network

volumes:
  postgres_data:

networks:
  module6_network:
    driver: bridge